# Trivy config for bopp-os/cachyos bootc image scanning
# These are false-positive suppressions specific to a desktop OS image
# that ships Go stdlib source and Qt dev test scaffolding

scan:
  skip-dirs:
    - usr/lib/go/src
    - usr/lib/qt/mkspecs
    - usr/lib/qt6/mkspecs
    - usr/share/locale       # translation files, can be 500MB+
    - usr/share/man          # man pages
    - usr/share/doc          # package documentation
    - usr/share/gtk-doc      # GTK API docs
    - usr/share/help         # GNOME yelp help content
    - usr/share/icons        # icon themes
    - usr/share/pixmaps      # legacy icons
    - usr/share/fonts        # font files
    - usr/share/mime         # MIME type XML data
    - usr/lib/firmware       # binary firmware blobs
    - usr/lib/debug          # split debug symbols if present
    - usr/share/wallpapers   # KDE wallpapers
    - usr/share/plasma       # KDE plasma themes/assets
    - usr/share/nano-syntax-highlighting

  # Skip binary and media file extensions - secret scanner can't find
  # anything useful in these and they add significant walk time on a 15GB image
  skip-files:
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.gif"
    - "*.webp"
    - "*.svg"
    - "*.ico"
    - "*.ttf"
    - "*.otf"
    - "*.woff"
    - "*.woff2"
    - "*.eot"
    - "*.mp3"
    - "*.mp4"
    - "*.ogg"
    - "*.wav"
    - "*.flac"
    - "*.mo"     # compiled gettext translations
    - "*.gmo"
    - "*.pyc"    # compiled Python bytecode
    - "*.pyo"
    - "*.so"     # shared libraries (Trivy handles these via gobinary/ELF, not secret scan)
    - "*.a"      # static libs
    - "*.gz"
    - "*.zst"
    - "*.xz"
    - "*.bz2"
    - "*.zip"
    - "*/LICENSES.chromium.html"

misconfig:
  include-non-failures: false

secret:
  config: trivy-secret.yaml