name: Update Package Intervals

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:
    inputs:
      max_age:
        description: 'Max age for cached entries in days'
        required: false
        default: '30'
      force_podman:
        description: 'Force Podman extraction (ignore SBOM)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (verbose output, no commit)'
        required: false
        type: boolean
        default: false

jobs:
  update-intervals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate Package Lists from All Images
        run: |
          mkdir -p build
          touch build/all-packages-temp.txt build/cachyos-packages-temp.txt build/boppos-packages-temp.txt
          
          # Spin up the latest version of every image flavor to build a master superset of packages
          for FLAVOR in plasma gnome niri; do
            IMAGE_REF="ghcr.io/${{ github.repository_owner }}/cachyos-${FLAVOR}:v3"
            USE_PODMAN=false
            
            if [ "${{ github.event.inputs.force_podman }}" == "true" ]; then
              USE_PODMAN=true
            else
              echo "Attempting to download SBOM for $IMAGE_REF..."
              if cosign download sbom "$IMAGE_REF" > sbom-${FLAVOR}.json 2>/dev/null && [ -s sbom-${FLAVOR}.json ]; then
                # Validate SBOM structure (handles both flat arrays and .packages objects)
                if jq -e 'if type=="array" then (.[0] | has("repository")) else (.packages[0] | has("repository")) end' sbom-${FLAVOR}.json > /dev/null 2>&1; then
                  echo "Successfully downloaded and validated SBOM."
                  jq -r 'if type=="array" then .[] else .packages[] end | .name' sbom-${FLAVOR}.json >> build/all-packages-temp.txt
                  jq -r 'if type=="array" then .[] else .packages[] end | select(.repository != null and (.repository | test("cachyos"))) | .name' sbom-${FLAVOR}.json >> build/cachyos-packages-temp.txt 2>/dev/null || true
                  jq -r 'if type=="array" then .[] else .packages[] end | select(.repository != null and (.repository | test("bopp-os"))) | .name' sbom-${FLAVOR}.json >> build/boppos-packages-temp.txt 2>/dev/null || true
                else
                  echo "SBOM format unrecognized or missing package names. Falling back to Podman."
                  USE_PODMAN=true
                fi
              else
                echo "Failed to download SBOM or SBOM is empty. Falling back to Podman."
                USE_PODMAN=true
              fi
            fi
            
            if [ "$USE_PODMAN" == "true" ]; then
              echo "Extracting packages using Podman mount fallback..."
              CONTAINER_ID=$(sudo podman create "$IMAGE_REF")
              MNT_DIR=$(sudo podman mount "$CONTAINER_ID")
              
              sudo cat "$MNT_DIR/usr/share/boppos/packages.json" | jq -r 'if type=="array" then .[] else .packages[] end | .name' >> build/all-packages-temp.txt || true
              sudo cat "$MNT_DIR/usr/share/boppos/packages.json" | jq -r 'if type=="array" then .[] else .packages[] end | select(.repository != null and (.repository | test("cachyos"))) | .name' >> build/cachyos-packages-temp.txt 2>/dev/null || true
              sudo cat "$MNT_DIR/usr/share/boppos/packages.json" | jq -r 'if type=="array" then .[] else .packages[] end | select(.repository != null and (.repository | test("bopp-os"))) | .name' >> build/boppos-packages-temp.txt 2>/dev/null || true
              
              sudo podman unmount "$CONTAINER_ID" >/dev/null 2>&1 || true
              sudo podman rm "$CONTAINER_ID" >/dev/null 2>&1 || true
            fi
          done
          
          sort -u build/all-packages-temp.txt > build/all-packages.txt
          sort -u build/cachyos-packages-temp.txt > build/cachyos-packages.txt
          sort -u build/boppos-packages-temp.txt > build/boppos-packages.txt

      - name: Fetch and Calculate Chunkah Intervals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY_RUN_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          
          cat build/all-packages.txt | python scripts/fetch-update-intervals.py \
            --cachyos-packages build/cachyos-packages.txt \
            --boppos-packages build/boppos-packages.txt \
            --cache-file scripts/package-intervals.json \
            --max-age-days ${{ github.event.inputs.max_age || '30' }} \
            --concurrency 10 $DRY_RUN_ARG

      - name: Commit and Push Package Intervals
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f scripts/package-intervals.json
          git diff --staged --exit-code || (git commit -m "chore: update package intervals" && git push)
