# GuaraOS: zram is disabled in favour of zswap + disk swapfile.
#
# cachyos-settings ships /usr/lib/systemd/zram-generator.conf with a
# [zram0] block (zstd, priority 100). Without this override that device
# would be created at boot and activated as swap at priority 100,
# causing zswap to write compressed pages into another in-RAM compressed
# device — double compression, wasted RAM, no disk backing.
#
# GuaraOS swap strategy:
#   zswap (kernel, enabled via kargs)  — first-level in-RAM compressed pool
#     compressor : zstd
#     zpool      : zsmalloc
#     shrinker   : enabled (kernel 6.8+)
#   /var/swap/swapfile (32 GiB btrfs nested subvolume) — backing store
#
# See: /usr/lib/bootc/kargs.d/90-guaraos-optimizations.toml
#      /usr/libexec/guaraos-swap-setup  (first-boot provisioning)
#
# This file intentionally contains no [zramN] sections so that
# systemd-zram-generator creates no devices.
