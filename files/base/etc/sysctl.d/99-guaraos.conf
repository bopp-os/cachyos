# GuaraOS sysctl overrides
# File: /etc/sysctl.d/99-guaraos.conf
#
# Loaded after cachyos-settings (70-cachyos-settings.conf).
# Overrides CachyOS defaults where our use case differs and adds
# settings not covered upstream.
#
# Scope: all flavors (gnome + gamestation)

# ===========================================================================
# GAMING
# ===========================================================================

# Required by many modern games via Steam/Proton.
# Games known to crash or fail without this: Hogwarts Legacy, CS2,
# Star Citizen, THE FINALS, DayZ. Steam Deck ships this value.
# Linux default is 65530 — far too low for modern titles.
vm.max_map_count = 2147483642

# ===========================================================================
# DEVELOPMENT
# ===========================================================================

# Maximum number of inotify watches per user.
# Default (8192) is exhausted immediately by:
#   VS Code (one watch per workspace file), webpack/vite HMR,
#   cargo-watch, jest --watchAll, Yarn PnP, and most LSP servers.
# Failures are silent — tools just stop reacting to file changes.
fs.inotify.max_user_watches = 524288

# Maximum number of inotify instances per user.
# Each tool (VS Code, cargo-watch, etc.) opens its own instance.
fs.inotify.max_user_instances = 1024

# ===========================================================================
# AMD ZEN 4 — MULTI-CCD MEMORY
# ===========================================================================

# Ryzen 7000+ CPUs have two CCDs (Core Chiplet Dies) which the kernel
# sees as two NUMA nodes. The default zone_reclaim_mode=1 aggressively
# reclaims memory local to each node, causing unnecessary cross-CCD
# thrashing when one CCD's memory is pressured.
# Setting 0 disables zone reclaim entirely: the allocator falls back
# to remote memory before reclaiming local pages — far better for
# desktop / gaming workloads where a single process spans both CCDs.
vm.zone_reclaim_mode = 0

# ===========================================================================
# SWAPPINESS — override CachyOS default
# ===========================================================================

# CachyOS ships vm.swappiness=100, tuned for zram.
# GuaraOS uses zswap instead: a compressed in-RAM pool backed by a disk
# swapfile. With 32 GB of RAM, anonymous pages (games, running apps) should
# stay resident as long as possible. vm.swappiness controls how eagerly the
# kernel pushes anonymous pages into the swap path vs evicting file cache.
# Lower = prefer file-cache eviction (cheap, NVMe is fast) over compressing
# app/game memory. 40 = take advantage of the zswap pool under genuine
# pressure, but keep hot data resident in RAM. Not as conservative as 10
# (which wastes the pool entirely) nor as aggressive as 60-100 (zram territory
# where there is no backing disk store and you always want to compress).
vm.swappiness = 40

# ===========================================================================
# NETWORK
# ===========================================================================

# BBR (Bottleneck Bandwidth and RTT) congestion control.
# Outperforms the CUBIC default for most modern connections:
# better throughput under packet loss, lower bufferbloat latency.
# Measurably improves Git clones, Docker/OCI pulls, package downloads.
# Requires the tcp_bbr kernel module (present in linux-cachyos).
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open — reuse TLS session data on reconnects.
# 1 = client, 2 = server, 3 = both.
net.ipv4.tcp_fastopen = 3

# Increase the per-device receive queue beyond CachyOS's 4096.
# Prevents packet drops on burst traffic (large OCI image pulls, etc.).
net.core.netdev_max_backlog = 16384
