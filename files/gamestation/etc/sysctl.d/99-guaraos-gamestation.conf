# GuaraOS Gamestation — sysctl overrides
# Applied after cachyos-settings (70-*) and guaraos base (99-guaraos.conf).
# Target: gaming rigs where one process (the game) dominates CPU.

# Disable scheduler autogroups.
# Autogroups are designed for interactive multi-process workloads — they group
# processes into scheduling entities to prevent one group from starving others.
# On a gaming rig, the game and its Proton/Wine child processes ARE the workload.
# Autogroups create an artificial scheduling ceiling on their threads, reducing
# throughput. Disabling gives the game direct, unthrottled scheduler access.
kernel.sched_autogroup_enabled = 0
