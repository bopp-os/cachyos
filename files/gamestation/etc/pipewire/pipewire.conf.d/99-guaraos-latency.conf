# GuaraOS Gamestation — PipeWire low-latency configuration
#
# Reduces the default audio quantum from 1024 samples (~21ms at 48kHz)
# to 512 samples (~10ms), halving audio latency.
#
# This eliminates the common audio pops and desync that occur during
# Proton/Wine frame time spikes. Lower values (256) are possible but
# increase CPU overhead and risk of xruns on busy systems.
#
# Reference: https://gitlab.freedesktop.org/pipewire/pipewire/-/wikis/Config-PipeWire

context.properties = {
    default.clock.rate          = 48000
    default.clock.quantum       = 512
    default.clock.min-quantum   = 512
    default.clock.max-quantum   = 512
}
