# GuaraOS Gamestation — plasmalogin managed defaults
#
# This file sets distro-level defaults for the plasmalogin greeter.
# It is overridden at runtime by /etc/plasmalogin.conf and drop-ins
# in /etc/plasmalogin.conf.d/ (written by the first-boot autologin service).
#
# Reference: https://github.com/KDE/plasma-login-manager
# "In managed scenarios, this file can be modified to set a default
#  wallpaper or login session."

[General]
DefaultSession=gamescope-session.desktop
