# Trivy secret scanner config for bopp-os/cachyos
# Disables built-in rules that produce false positives in a desktop OS image

# Use disable-rules (not inline disabled: true) to avoid "Incorrect severity" warnings
disable-rules:
  - private-key       # fires on SSH host keys and Go stdlib test certs
  - generic-credential  # fires on placeholder values in PAM/NetworkManager configs

allow-rules:
  - id: allow-go-testdata
    paths:
      - usr/lib/go/src
      - usr/share/go/src

  - id: allow-etc-examples
    paths:
      - etc/NetworkManager/system-connections
      - etc/ssh
      - usr/share/doc
      - usr/share/examples