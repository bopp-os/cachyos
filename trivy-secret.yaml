# Trivy secret scanner config for bopp-os/cachyos
# Disables rules that produce false positives in a desktop OS image context

rules:
  # Disable generic private key rule - trips on ssh host keys baked into image,
  # test certs in Go stdlib source, and example keys in package docs
  - id: private-key
    disabled: true

  # Disable generic credential rule - trips on placeholder/example
  # values in config files shipped by packages (e.g. PAM, NetworkManager)
  - id: generic-credential
    disabled: true

allow-rules:
  # Allow test/example keys that ship with the Go standard library
  - id: allow-go-testdata
    paths:
      - usr/lib/go/src
      - usr/share/go/src

  # Allow example configs shipped by system packages
  - id: allow-etc-examples
    paths:
      - etc/NetworkManager/system-connections
      - etc/ssh
      - usr/share/doc
      - usr/share/examples